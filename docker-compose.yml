version: "3.9"

services:
  backend:
    build:
      context: ./backend
    environment:
      - ENVIRONMENT=development
      - DB_SCHEME=sqlite+aiosqlite
      - DB_NAME=/data/sponsorship_crm.db
    volumes:
      - crm_db:/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  crm_db:
